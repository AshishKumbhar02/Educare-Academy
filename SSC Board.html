        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6fb;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .logo {
            display: flex;
            align-items: center;
        }

        .logo img {
            width: 45px;
            margin-right: 10px;
        }

        .logo-text h2 {
            font-size: 18px;
            color: #1e3a8a;
        }

        .logo-text span {
            font-size: 12px;
            color: #666;
        }

        .nav-links a {
            margin-left: 20px;
            text-decoration: none;
            color: #333;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #4f46e5;
        }

        /* HERO */
        .hero {
            background: linear-gradient(120deg, #4f46e5, #6366f1);
            color: white;
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            font-size: 38px;
        }

        .hero i {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* LAYOUT */
        .container {
            display: flex;
            padding: 30px;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .sidebar h3 {
            margin-bottom: 15px;
            color: #1e3a8a;
        }

        .sidebar button {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border: none;
            border-radius: 8px;
            background: #eef2ff;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
        }

        .sidebar button i {
            margin-right: 8px;
        }

        .sidebar button:hover,
        .sidebar button.active {
            background: #4f46e5;
            color: white;
        }

        /* CONTENT */
        .content {
            flex: 1;
            margin-left: 20px;
        }

        /* CARD */
        .paper-box {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        /* TITLE */
        .title {
            font-size: 32px;
            color: #ef4444;
        }

        /* YEAR */
        .year {
            margin-top: 25px;
        }

        .year h2 {
            color: #1e3a8a;
        }

        /* LINKS */
        .links {
            margin-top: 10px;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 6px;
            padding: 10px 16px;
            border-radius: 30px;
            background: linear-gradient(45deg, #4f46e5, #6366f1);
            color: white;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .links a:hover {
            transform: translateY(-3px);
        }

        /* FOOTER */
        .footer {
            background: #1e1b4b;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        /* MOBILE */
        @media(max-width:768px) {
            .container {
                flex-direction: column;
            }

            .content {
                margin-left: 0;
                margin-top: 20px;
            }

            .sidebar {
                width: 100%;
            }

            .hero h1 {
                font-size: 26px;
            }
        }

        function loadData(subject) {

            let box = document.getElementById("paperBox");

            let html = `<h1 class="title">${subject.toUpperCase()}</h1>`;

            let data = papers[subject];

            if (!data) {
                box.innerHTML = "<h2>No Papers Available</h2>";
                return;
            }

            for (let year in data) {
                html += `
        <div class="year">
            <h2>${year}</h2>
            <div class="links">
                ${data[year].map(p => `
                <a href="${p.file}" target="_blank" download>
                    <i class="fa fa-download"></i> ${p.name.includes('QP') ? '📄' : '✅'} ${p.name}
                </a>
                `).join("")}
            </div>
        </div>`;
            }

            box.innerHTML = html;

            document.querySelectorAll(".sidebar button").forEach(btn => {
                btn.classList.remove("active");
            });

            event.target.classList.add("active");
        }

        loadData("Algebra");
